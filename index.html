<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Alert Console</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #ffffff; width: 100%; max-width: 500px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #003366; }
        h2 { color: #003366; text-align: center; margin-bottom: 20px; font-weight: 600; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 11px; font-weight: 700; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: border 0.3s; }
        input:focus { border-color: #003366; outline: none; }
        button { width: 100%; padding: 15px; background-color: #003366; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        button:hover { background-color: #002244; }
        .footer { text-align: center; font-size: 11px; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bank Alert Console</h2>
    
    <div class="form-grid">
        <div class="full-width">
            <label>Sender Bank Name</label>
            <input type="text" id="bank" placeholder="e.g. Chase Bank">
        </div>

        <div>
            <label>Recipient Name</label>
            <input type="text" id="name" placeholder="John Doe">
        </div>

        <div>
            <label>Recipient Email</label>
            <input type="email" id="email" placeholder="recipient@mail.com">
        </div>

        <div>
            <label>Receiving Bank</label>
            <input type="text" id="rbank" placeholder="e.g. Wells Fargo">
        </div>

        <div>
            <label>Swift / BIC Code</label>
            <input type="text" id="swift" placeholder="CHASEUS33">
        </div>

        <div>
            <label>Account Number</label>
            <input type="text" id="acc" placeholder="Ending in 1234">
        </div>

        <div>
            <label>Amount</label>
            <input type="text" id="amount" placeholder="$0.00">
        </div>

        <div class="full-width">
            <label>Transaction Status</label>
            <select id="status">
                <option value="SUCCESSFUL">SUCCESSFUL</option>
                <option value="PENDING">PENDING</option>
                <option value="ON HOLD">ON HOLD</option>
            </select>
        </div>

        <div class="full-width">
            <label>Transaction Memo / Note</label>
            <input type="text" id="note" placeholder="Wire Transfer Clearance">
        </div>
    </div>

    <button onclick="sendAlert()">Transmit Professional Alert</button>
    <p class="footer">Secure encrypted transaction console.</p>
</div>

<script>
    (function() {
        emailjs.init("yrajewB2Tb81Y7MUb"); 
    })();

    function sendAlert() {
        const btn = document.querySelector("button");
        btn.innerText = "Transmitting...";
        btn.disabled = true;

        const params = {
            bank: document.getElementById('bank').value,
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            rbank: document.getElementById('rbank').value,
            acc: document.getElementById('acc').value,
            swift: document.getElementById('swift').value,
            amount: document.getElementById('amount').value,
            status: document.getElementById('status').value,
            note: document.getElementById('note').value
        };

        emailjs.send("service_ruzvnnl", "template_turjf9q", params)
        .then(function() {
            alert("SUCCESS! Alert sent to " + params.email);
            btn.innerText = "Transmit Professional Alert";
            btn.disabled = false;
        }, function(error) {
            alert("ERROR: Please make sure your EmailJS template is SAVED. Details: " + JSON.stringify(error));
            btn.innerText = "Transmit Professional Alert";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
