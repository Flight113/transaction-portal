<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Admin Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #004a99; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #004a99; color: white; border: none; border-radius: 5px; font-size: 16px; margin-top: 20px; cursor: pointer; }
        button:hover { background: #003366; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2 style="color:#004a99;">Direct Alert System</h2></div>
    <form id="bankForm">
        <label>Sender Bank Name</label>
        <input type="text" id="bank_name" placeholder="e.g. Citibank" required>
        
        <label>Recipient Email</label>
        <input type="email" id="to_email" required>
        
        <label>Recipient Name</label>
        <input type="text" id="to_name" required>

        <label>Amount</label>
        <input type="text" id="amount" placeholder="$25,000.00" required>

        <label>Status</label>
        <select id="status">
            <option value="SUCCESSFUL">SUCCESSFUL</option>
            <option value="PENDING">PENDING</option>
            <option value="DELAYED">DELAYED</option>
        </select>

        <label>Status Note</label>
        <input type="text" id="note" placeholder="Funds are processing">

        <button type="button" onclick="sendEmail()">Send Alert Directly</button>
    </form>
</div>

<script>
async function sendEmail() {
    const apiKey = "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"; // Paste your Brevo Key here
    const bank = document.getElementById('bank_name').value;
    const email = document.getElementById('to_email').value;
    const name = document.getElementById('to_name').value;
    const amount = document.getElementById('amount').value;
    const status = document.getElementById('status').value;
    const note = document.getElementById('note').value;

    const response = await fetch('https://api.brevo.com/v3/smtp/email', {
        method: 'POST',
        headers: {
            'accept': 'application/json',
            'api-key': apiKey,
            'content-type': 'application/json'
        },
        body: JSON.stringify({
            sender: { name: bank, email: "notifications@transaction-alert.com" },
            to: [{ email: email, name: name }],
            subject: `Transaction Alert: ${status}`,
            htmlContent: `
                <div style="font-family:Arial; border:1px solid #eee; padding:20px;">
                    <h2 style="color:#004a99;">${bank}</h2>
                    <p>Dear ${name},</p>
                    <p>A transaction of <b>${amount}</b> is currently <b>${status}</b>.</p>
                    <p><b>Note:</b> ${note}</p>
                    <hr>
                    <p style="font-size:12px; color:#999;">Reference: TXN-${Math.floor(Math.random()*1000000)}</p>
                </div>`
        })
    });

    if (response.ok) {
        alert("Alert sent directly to " + email);
    } else {
        alert("Error sending email. Check your API key.");
    }
}
</script>
</body>
</html>
