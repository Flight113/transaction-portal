<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Bank Dispatch Terminal</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #ffffff; width: 100%; max-width: 480px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #003366; }
        .header { background-color: #003366; color: white; padding: 25px; text-align: center; }
        .header h2 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        .form-body { padding: 25px; }
        .section-label { font-size: 11px; font-weight: 900; color: #003366; text-transform: uppercase; margin: 20px 0 10px; border-bottom: 2px solid #f0f2f5; padding-bottom: 5px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e1e8ed; border-radius: 6px; margin-bottom: 15px; font-size: 14px; box-sizing: border-box; background-color: #f7f9fc; }
        button { width: 100%; padding: 18px; background-color: #003366; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background-color: #1a2a40; }
        .footer { text-align: center; font-size: 10px; color: #bbb; margin-top: 15px; padding-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🏛️ DISPATCH CONSOLE</h2>
    </div>
    
    <div class="form-body">
        <div class="section-label">1. Origin Details</div>
        <label>Bank Name (Header)</label>
        <input type="text" id="bank" placeholder="e.g. JPMorgan Chase">
        
        <label>Sender Full Name</label>
        <input type="text" id="sender_name" placeholder="Full name of sender">

        <div class="section-label">2. Recipient & Destination</div>
        <label>Recipient Name</label>
        <input type="text" id="name" placeholder="Full name of receiver">
        
        <label>Recipient Email Address</label>
        <input type="email" id="email" placeholder="client@example.com">

        <label>Receiving Bank Name</label>
        <input type="text" id="rbank" placeholder="e.g. Bank of America">

        <label>Account Number</label>
        <input type="text" id="acc" placeholder="Account or IBAN">

        <label>SWIFT / Routing Code</label>
        <input type="text" id="swift" placeholder="BIC/SWIFT Code">

        <div class="section-label">3. Transaction Parameters</div>
        <label>Amount (with currency)</label>
        <input type="text" id="amount" placeholder="$5,000.00">

        <label>Transmission Status</label>
        <select id="status">
            <option value="SUCCESSFUL">✅ SUCCESSFUL</option>
            <option value="PENDING">⏳ PENDING</option>
            <option value="PROCESSING">⚙️ PROCESSING</option>
            <option value="ON HOLD">❌ ON HOLD</option>
        </select>

        <label>Security Remark</label>
        <input type="text" id="note" placeholder="e.g. Verified by Security Dept.">

        <button id="mainBtn" onclick="sendAlert()">Authorize & Send Receipt</button>
    </div>
    <div class="footer">ENCRYPTED SESSION ID: 2026-X99</div>
</div>

<script>
    // Initializing with your Public Key
    (function() { emailjs.init("yrajewB2Tb81Y7MUb"); })();

    function sendAlert() {
        const btn = document.getElementById("mainBtn");
        btn.innerText = "Transmitting...";
        btn.disabled = true;

        // Creating dynamic variables to match your EmailJS code
        const transId = "ID-" + Math.floor(Math.random() * 8999999 + 1111111);
        
        // Formats: Sun, Apr 26, 2026, 08:39 PM
        const currentDateTime = new Date().toLocaleString('en-US', { 
            weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', 
            hour: '2-digit', minute: '2-digit', hour12: true 
        });

        const params = {
            bank: document.getElementById('bank').value,
            sender_name: document.getElementById('sender_name').value,
            name: document.getElementById('name').value,
            email_to: document.getElementById('email').value,
            rbank: document.getElementById('rbank').value,
            acc: document.getElementById('acc').value,
            swift: document.getElementById('swift').value,
            amount: document.getElementById('amount').value,
            status: document.getElementById('status').value,
            note: document.getElementById('note').value,
            trans_id: transId,
            date_time: currentDateTime
        };

        // Linked to your specific Outlook Service and Template
        emailjs.send("service_9h1jsnw", "template_turjf9q", params)
        .then(() => {
            alert("DISPATCH COMPLETE: Formal receipt is in the inbox.");
            btn.innerText = "Authorize & Send Receipt";
            btn.disabled = false;
        })
        .catch((err) => {
            alert("FAILURE: Check your EmailJS connection settings.");
            console.error("EmailJS Error:", err);
            btn.innerText = "Authorize & Send Receipt";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
