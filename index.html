<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Management Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid #004a99; margin-bottom: 25px; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #004a99; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background: #003366; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2 style="color:#004a99; margin:0;">Transaction Management Console</h2></div>
    <form id="bankForm">
        <div class="grid">
            <div class="full">
                <label>Sender Bank Display Name</label>
                <input type="text" id="bank_name" placeholder="e.g. Standard Chartered Bank" required>
            </div>
            <div><label>Recipient Name</label><input type="text" id="to_name" required></div>
            <div><label>Recipient Email</label><input type="email" id="to_email" required></div>
            <div><label>Recipient Bank Name</label><input type="text" id="recp_bank" required></div>
            <div><label>Recipient Account Number</label><input type="text" id="acc_num" required></div>
            <div><label>Swift / BIC Code</label><input type="text" id="swift" required></div>
            <div><label>Transaction ID</label><input type="text" id="txn_id" value="TXN-8829410"></div>
            <div><label>Payment Method</label><input type="text" id="method" placeholder="Online Transfer"></div>
            <div><label>Amount (with Currency)</label><input type="text" id="amount" placeholder="$50,000.00" required></div>
            <div>
                <label>Status</label>
                <select id="status">
                    <option value="SUCCESSFUL">SUCCESSFUL</option>
                    <option value="PENDING">PENDING</option>
                    <option value="DELAYED">DELAYED</option>
                </select>
            </div>
            <div class="full">
                <label>Status Note</label>
                <input type="text" id="note" placeholder="Funds are scheduled to reflect in 24 hours">
            </div>
        </div>
        <button type="button" onclick="sendAlert()">Execute Professional Alert</button>
    </form>
</div>

<script>
async function sendAlert() {
    const apiKey = "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";
    const senderEmail = "kingmarcel113@gmail.com"; 

    const data = {
        bank: document.getElementById('bank_name').value,
        email: document.getElementById('to_email').value,
        name: document.getElementById('to_name').value,
        amount: document.getElementById('amount').value,
        status: document.getElementById('status').value,
        note: document.getElementById('note').value,
        swift: document.getElementById('swift').value,
        acc: document.getElementById('acc_num').value,
        rbank: document.getElementById('recp_bank').value,
        tid: document.getElementById('txn_id').value,
        meth: document.getElementById('method').value
    };

    try {
        const response = await fetch('https://api.brevo.com/v3/smtp/email', {
            method: 'POST',
            headers: { 
                'accept': 'application/json', 
                'api-key': apiKey, 
                'content-type': 'application/json' 
            },
            body: JSON.stringify({
                sender: { name: data.bank, email: senderEmail },
                replyTo: { email: "no-reply@transaction-verify.com" },
                to: [{ email: data.email, name: data.name }],
                subject: `CREDIT ALERT: ${data.status} - Ref: ${data.tid}`,
                htmlContent: `
                    <div style="font-family:Arial,sans-serif; max-width:600px; border:1px solid #eee; padding:20px; color:#333;">
                        <h2 style="color:#004a99; text-align:center; border-bottom:2px solid #004a99; padding-bottom:10px;">${data.bank}</h2>
                        <div style="text-align:center; padding:10px; background:#f8f9fa; font-weight:bold; font-size:18px; color:#004a99;">${data.status}</div>
                        <p>Dear ${data.name},</p>
                        <p>This is a formal notification regarding a credit transaction to your account details below:</p>
                        <table style="width:100%; border-collapse:collapse;">
                            <tr><td style="color:#777; padding:8px 0; border-bottom:1px solid #eee;">Recipient Bank:</td><td style="text-align:right; font-weight:bold; border-bottom:1px solid #eee;">${data.rbank}</td></tr>
                            <tr><td style="color:#777; padding:8px 0; border-bottom:1px solid #eee;">Account Number:</td><td style="text-align:right; font-weight:bold; border-bottom:1px solid #eee;">****${data.acc.slice(-4)}</td></tr>
                            <tr><td style="color:#777; padding:8px 0; border-bottom:1px solid #eee;">Swift Code:</td><td style="text-align:right; font-weight:bold; border-bottom:1px solid #eee;">${data.swift}</td></tr>
                            <tr><td style="color:#777; padding:8px 0; border-bottom:1px solid #eee;">Transaction ID:</td><td style="text-align:right; font-weight:bold; border-bottom:1px solid #eee;">${data.tid}</td></tr>
                            <tr><td style="color:#777; padding:8px 0;">Amount:</td><td style="text-align:right; font-weight:bold; color:#004a99; font-size:20px;">${data.amount}</td></tr>
                        </table>
                        <div style="margin-top:20px; padding:10px; border-left:4px solid #004a99; background:#f0f4f8;">
                            <b>Status Note:</b> ${data.note}
                        </div>
                        <p style="font-size:11px; color:#999; text-align:center; margin-top:30px;">
                            &copy; 2026 ${data.bank} Group. All rights reserved. <br>
                            This is a secure automated message. Please do not share transaction details.
                        </p>
                    </div>`
            })
        });

        if (response.ok) {
            alert("Transaction Alert Sent Successfully!");
        } else {
            const err = await response.json();
            alert("Error: " + err.message);
        }
    } catch (e) {
        alert("Connection Error: Check your internet and API key.");
    }
}
</script>
</body>
</html>
