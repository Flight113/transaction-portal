<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Transaction Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #1a73e8; }
        h2 { color: #1a73e8; margin-bottom: 25px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #666; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #dcdcdc; border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 5px rgba(26,115,232,0.2); }
        button { width: 100%; padding: 16px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bank Alert Console</h2>
    <div class="grid">
        <div class="full">
            <label>Sender Bank Name</label>
            <input type="text" id="bank_name" placeholder="e.g. Standard Chartered Bank">
        </div>
        <div><label>Recipient Name</label><input type="text" id="to_name"></div>
        <div><label>Recipient Email</label><input type="email" id="to_email"></div>
        <div><label>Recipient Bank</label><input type="text" id="recp_bank"></div>
        <div><label>Account Number</label><input type="text" id="acc_num"></div>
        <div><label>Amount</label><input type="text" id="amount" placeholder="$0.00"></div>
        <div>
            <label>Status</label>
            <select id="status">
                <option value="SUCCESSFUL">SUCCESSFUL</option>
                <option value="PENDING">PENDING</option>
                <option value="ON HOLD">ON HOLD</option>
            </select>
        </div>
        <div class="full">
            <label>Transaction Memo</label>
            <input type="text" id="note" placeholder="Funds available in 24 hours">
        </div>
    </div>
    <button onclick="sendViaResend()">Transmit Alert Now</button>
</div>

<script>
async function sendViaResend() {
    // 1. YOUR API KEY
    const RESEND_API_KEY = "re_oMeq4mzF_9q5ZDErAB5Zt1VFAmAYFNXWQ";

    const data = {
        bank: document.getElementById('bank_name').value,
        email: document.getElementById('to_email').value,
        name: document.getElementById('to_name').value,
        amount: document.getElementById('amount').value,
        status: document.getElementById('status').value,
        note: document.getElementById('note').value,
        acc: document.getElementById('acc_num').value,
        rbank: document.getElementById('recp_bank').value
    };

    try {
        const response = await fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${RESEND_API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                from: `${data.bank} <onboarding@resend.dev>`, // Uses Resend's default sender to ensure delivery
                to: [data.email],
                subject: `Credit Notification: ${data.status}`,
                html: `
                <div style="font-family:sans-serif; max-width:600px; padding:20px; border:1px solid #ddd;">
                    <h1 style="color:#1a73e8; text-align:center;">${data.bank}</h1>
                    <div style="background:#f8f9fa; padding:15px; text-align:center; font-weight:bold; font-size:18px;">${data.status}</div>
                    <p>Dear ${data.name},</p>
                    <p>A credit transaction has been processed for your account.</p>
                    <hr border="0" style="border-top:1px solid #eee;">
                    <p><strong>Amount:</strong> ${data.amount}</p>
                    <p><strong>Receiving Bank:</strong> ${data.rbank}</p>
                    <p><strong>Account Number:</strong> ****${data.acc.slice(-4)}</p>
                    <p><strong>Note:</strong> ${data.note}</p>
                    <p style="font-size:11px; color:#888; margin-top:40px;">This is an automated security alert. Do not reply.</p>
                </div>`
            })
        });

        if (response.ok) {
            alert("Sent Successfully via Resend!");
        } else {
            const err = await response.json();
            alert("Error: " + err.message);
        }
    } catch (e) {
        alert("Failed to connect. Check your internet.");
    }
}
</script>
</body>
</html>
