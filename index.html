<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Admin Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid #004a99; margin-bottom: 20px; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 18px; background: #004a99; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #003366; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:#004a99; margin:0;">Direct Bank Alert Panel</h2>
        <p style="font-size: 12px; color: #666;">Send full professional receipts directly to inbox</p>
    </div>
    
    <form id="bankForm">
        <div class="grid">
            <div class="full">
                <label>Display Bank Name (The Sender)</label>
                <input type="text" id="bank_name" placeholder="e.g. Standard Chartered" required>
            </div>

            <div>
                <label>Recipient Name</label>
                <input type="text" id="to_name" required>
            </div>
            <div>
                <label>Recipient Email</label>
                <input type="email" id="to_email" required>
            </div>

            <div>
                <label>Recipient Bank</label>
                <input type="text" id="recipient_bank" required>
            </div>
            <div>
                <label>Recipient Account Number</label>
                <input type="text" id="account_number" required>
            </div>

            <div>
                <label>Swift / BIC Code</label>
                <input type="text" id="swift_code" required>
            </div>
            <div>
                <label>Payment Method</label>
                <select id="payment_method">
                    <option value="Wire Transfer">Wire Transfer</option>
                    <option value="Online Banking">Online Banking</option>
                    <option value="ACH Transfer">ACH Transfer</option>
                </select>
            </div>

            <div>
                <label>Amount (with currency)</label>
                <input type="text" id="amount" placeholder="$10,000.00" required>
            </div>
            <div>
                <label>Transaction Status</label>
                <select id="status">
                    <option value="SUCCESSFUL">SUCCESSFUL</option>
                    <option value="PENDING">PENDING</option>
                    <option value="DELAYED">DELAYED</option>
                </select>
            </div>

            <div class="full">
                <label>Status Note (Short Message)</label>
                <input type="text" id="note" placeholder="Funds are processing and will reflect shortly">
            </div>
        </div>

        <button type="button" onclick="sendEmail()">Send Alert Directly</button>
    </form>
</div>

<script>
async function sendEmail() {
    // PASTE YOUR BREVO API KEY HERE
    const apiKey = "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"; 
    
    const btn = document.querySelector('button');
    btn.innerText = "Sending...";
    btn.disabled = true;

    const details = {
        bank: document.getElementById('bank_name').value,
        email: document.getElementById('to_email').value,
        name: document.getElementById('to_name').value,
        recBank: document.getElementById('recipient_bank').value,
        accNum: document.getElementById('account_number').value,
        swift: document.getElementById('swift_code').value,
        method: document.getElementById('payment_method').value,
        amount: document.getElementById('amount').value,
        status: document.getElementById('status').value,
        note: document.getElementById('note').value,
        txnId: "TXN-" + Math.floor(Math.random() * 900000 + 100000)
    };

    const response = await fetch('https://api.brevo.com/v3/smtp/email', {
        method: 'POST',
        headers: {
            'accept': 'application/json',
            'api-key': apiKey,
            'content-type': 'application/json'
        },
        body: JSON.stringify({
            sender: { name: details.bank, email: "notifications@secure-transfer.com" },
            to: [{ email: details.email, name: details.name }],
            subject: `Transaction Alert: ${details.status}`,
            htmlContent: `
                <div style="font-family:Arial, sans-serif; max-width:600px; margin:auto; border:1px solid #ddd; padding:20px;">
                    <div style="text-align:center; border-bottom:2px solid #004a99; padding-bottom:10px;">
                        <h2 style="color:#004a99; margin:0;">${details.bank}</h2>
                    </div>
                    <div style="padding:20px 0;">
                        <p>Dear ${details.name},</p>
                        <p>This is to notify you of a ${details.status.toLowerCase()} transaction on your account.</p>
                        <table style="width:100%; border-collapse:collapse;">
                            <tr><td style="padding:8px; color:#777;">Recipient Bank:</td><td style="text-align:right; font-weight:bold;">${details.recBank}</td></tr>
                            <tr><td style="padding:8px; color:#777;">Account Number:</td><td style="text-align:right; font-weight:bold;">${details.accNum}</td></tr>
                            <tr><td style="padding:8px; color:#777;">Swift Code:</td><td style="text-align:right; font-weight:bold;">${details.swift}</td></tr>
                            <tr><td style="padding:8px; color:#777;">Payment Method:</td><td style="text-align:right; font-weight:bold;">${details.method}</td></tr>
                            <tr><td style="padding:8px; color:#777;">Transaction ID:</td><td style="text-align:right; font-weight:bold;">${details.txnId}</td></tr>
                            <tr><td style="padding:8px; color:#777; font-size:18px;">Amount:</td><td style="text-align:right; font-weight:bold; font-size:18px; color:#004a99;">${details.amount}</td></tr>
                        </table>
                        <div style="margin-top:20px; padding:10px; background:#f9f9f9; border-radius:5px; text-align:center;">
                            <strong>Status Note:</strong> ${details.note}
                        </div>
                    </div>
                    <div style="font-size:12px; color:#999; text-align:center; border-top:1px solid #eee; padding-top:10px;">
                        &copy; 2026 ${details.bank} International. All rights reserved.
                    </div>
                </div>`
        })
    });

    if (response.ok) {
        alert("Success! Alert sent to " + details.email);
    } else {
        alert("Error sending alert. Please check your Brevo API key.");
    }
    btn.innerText = "Send Alert Directly";
    btn.disabled = false;
}
</script>
</body>
</html>
