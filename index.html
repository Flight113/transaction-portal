<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Asset Transmission Console</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b1120; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: #fff; }
        .container { background-color: #ffffff; width: 100%; max-width: 550px; padding: 25px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); color: #333; border-top: 10px solid #0052ff; max-height: 95vh; overflow-y: auto; }
        h2 { color: #0052ff; text-align: center; margin-bottom: 15px; font-weight: 800; text-transform: uppercase; font-size: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .section-label { grid-column: span 2; font-size: 11px; font-weight: 900; color: #0052ff; border-bottom: 1px solid #e2e8f0; margin-top: 15px; padding-bottom: 3px; text-transform: uppercase; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 3px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 14px; background-color: #f8fafc; color: #333; }
        .platform-header { background: #f1f5f9; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        button { width: 100%; padding: 16px; background-color: #0052ff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .footer { text-align: center; font-size: 10px; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h2>📡 Asset Terminal</h2>
    
    <div class="platform-header">
        <label>Transmission Protocol</label>
        <select id="platformSelector" onchange="updateLayout()">
            <option value="">-- Choose Platform --</option>
            <optgroup label="Apps & Wallets">
                <option value="PayPal">PayPal</option>
                <option value="CashApp">CashApp</option>
                <option value="Zelle">Zelle</option>
                <option value="Venmo">Venmo</option>
                <option value="ApplePay">Apple Pay</option>
            </optgroup>
            <optgroup label="Banking Institutions">
                <option value="Chase">Chase Bank</option>
                <option value="BofA">Bank of America</option>
                <option value="Wells">Wells Fargo</option>
                <option value="Wise">Wise</option>
                <option value="Revolut">Revolut</option>
            </optgroup>
            <optgroup label="Cryptocurrency">
                <option value="BTC">Bitcoin (BTC)</option>
                <option value="USDT">Tether (USDT)</option>
            </optgroup>
        </select>
    </div>

    <div class="form-grid">
        <div class="section-label">Sender Setup</div>
        <div class="full-width">
            <label id="bankLabel">Sender Institution</label>
            <input type="text" id="bank" placeholder="Institution Name">
        </div>
        <div class="full-width">
            <label>Sender Full Name</label>
            <input type="text" id="sender_name" placeholder="Name of Person/Entity Sending">
        </div>

        <div class="section-label">Recipient Setup</div>
        <div><label>Recipient Name</label><input type="text" id="name"></div>
        <div><label>Recipient Email</label><input type="email" id="email"></div>
        <div id="rbank-div"><label>Receiving Bank</label><input type="text" id="rbank"></div>
        <div><label id="accLabel">Account/Wallet</label><input type="text" id="acc"></div>
        <div id="swift-div"><label id="swiftLabel">Swift/Network</label><input type="text" id="swift"></div>
        <div><label>Amount (USD)</label><input type="text" id="amount"></div>

        <div class="section-label">Transaction Control</div>
        <div class="full-width">
            <label>Current Status</label>
            <select id="status">
                <option value="SUCCESSFUL">✅ SUCCESSFUL</option>
                <option value="PENDING">⏳ PENDING</option>
                <option value="PROCESSING">⚙️ PROCESSING</option>
                <option value="ON HOLD">⚠️ ON HOLD</option>
                <option value="CANCELLED">❌ CANCELLED</option>
                <option value="DELAYED">🕒 DELAYED</option>
            </select>
        </div>
        <div class="full-width">
            <label>Status Reason / Note</label>
            <input type="text" id="note" placeholder="Reason for status update">
        </div>
    </div>

    <button id="mainBtn" onclick="sendAlert()">Authorize Transmission</button>
    <p class="footer">TERMINAL ID: 8842-AX | SECURE SESSION ACTIVE</p>
</div>

<script>
    (function() { emailjs.init("yrajewB2Tb81Y7MUb"); })();

    function updateLayout() {
        const platform = document.getElementById('platformSelector').value;
        const container = document.getElementById('mainContainer');
        const bankInput = document.getElementById('bank');
        const swiftInput = document.getElementById('swift');
        const rbankDiv = document.getElementById('rbank-div');
        const bankLabel = document.getElementById('bankLabel');
        const accLabel = document.getElementById('accLabel');
        const swiftLabel = document.getElementById('swiftLabel');

        const profiles = {
            'PayPal': { bank: 'PayPal Holdings Inc.', swift: 'PAYPALUSA1', crypto: false },
            'CashApp': { bank: 'CashApp / Block Inc.', swift: 'CASHAPPUSA', crypto: false },
            'Zelle': { bank: 'Zelle Network Service', swift: 'ZELLE001', crypto: false },
            'Venmo': { bank: 'Venmo / PayPal', swift: 'VENMOUSA', crypto: false },
            'ApplePay': { bank: 'Apple Pay / Goldman Sachs', swift: 'APPLEUSA', crypto: false },
            'Chase': { bank: 'JPMorgan Chase & Co.', swift: 'CHASUS33', crypto: false },
            'BofA': { bank: 'Bank of America N.A.', swift: 'BOFAUS3N', crypto: false },
            'Wells': { bank: 'Wells Fargo & Co.', swift: 'WFCUS33', crypto: false },
            'Wise': { bank: 'Wise Payments Ltd.', swift: 'WISEUS33', crypto: false },
            'Revolut': { bank: 'Revolut Ltd.', swift: 'REVOUS22', crypto: false },
            'BTC': { bank: 'Bitcoin Network (BTC)', swift: 'BLOCKCHAIN', crypto: true },
            'USDT': { bank: 'Tether Treasury (USDT)', swift: 'TRC-20', crypto: true }
        };

        if (profiles[platform]) {
            const data = profiles[platform];
            bankInput.value = data.bank;
            swiftInput.value = data.swift;

            if (data.crypto) {
                container.style.borderTopColor = "#f7931a";
                bankLabel.innerText = "Blockchain Network";
                accLabel.innerText = "Wallet Address";
                swiftLabel.innerText = "Network Type";
                rbankDiv.style.display = "none";
            } else {
                container.style.borderTopColor = "#0052ff";
                bankLabel.innerText = "Institution Name";
                accLabel.innerText = "Account Number";
                swiftLabel.innerText = "Swift / Routing";
                rbankDiv.style.display = "block";
            }
        }
    }

    function sendAlert() {
        const btn = document.getElementById("mainBtn");
        btn.innerText = "Transmitting...";
        btn.disabled = true;

        const transId = "TRN-" + Math.floor(Math.random() * 90000000 + 10000000);
        const now = new Date().toLocaleString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

        const params = {
            bank: document.getElementById('bank').value,
            sender_name: document.getElementById('sender_name').value,
            name: document.getElementById('name').value,
            email_to: document.getElementById('email').value,
            rbank: document.getElementById('rbank').value || "N/A",
            acc: document.getElementById('acc').value,
            swift: document.getElementById('swift').value,
            amount: document.getElementById('amount').value,
            status: document.getElementById('status').value,
            note: document.getElementById('note').value,
            trans_id: transId,
            date_time: now
        };

        emailjs.send("service_9h1jsnw", "template_turjf9q", params)
        .then(() => {
            alert("SUCCESS: Dispatched.");
            btn.innerText = "Authorize Transmission";
            btn.disabled = false;
        })
        .catch((err) => {
            alert("ERROR: Check Setup");
            btn.innerText = "Authorize Transmission";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
